name: build

# Compila ejecutables listos para descargar y adjunta a la Release del tag vX.Y.Z:
#   - Windows: PixelBones-windows.exe        (doble clic)
#   - Linux:   PixelBones-x86_64.AppImage    (portable, doble clic)
#              PixelBones-amd64.deb          (instalar: doble clic -> Software)
#   - macOS:   PixelBones-macos
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pygame-ce pyinstaller pillow
      - run: pyinstaller --noconfirm --clean PixelBones.spec

      - name: Empaquetar Windows
        if: matrix.os == 'windows-latest'
        shell: bash
        run: cp dist/PixelBones.exe PixelBones-windows.exe

      - name: Empaquetar macOS
        if: matrix.os == 'macos-latest'
        shell: bash
        run: cp dist/PixelBones PixelBones-macos

      - name: Empaquetar Linux (AppImage + .deb)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -e
          # ---------- AppImage (portable) ----------
          APP=AppDir
          mkdir -p "$APP/usr/bin"
          cp dist/PixelBones "$APP/usr/bin/PixelBones"
          cp docs/icon.png "$APP/PixelBones.png"
          printf '%s\n' '[Desktop Entry]' 'Type=Application' 'Name=PixelBones' \
            'Exec=PixelBones' 'Icon=PixelBones' 'Categories=Graphics;' \
            'Terminal=false' > "$APP/PixelBones.desktop"
          printf '%s\n' '#!/bin/sh' \
            'HERE="$(dirname "$(readlink -f "$0")")"' \
            'exec "$HERE/usr/bin/PixelBones" "$@"' > "$APP/AppRun"
          chmod +x "$APP/AppRun" "$APP/usr/bin/PixelBones"
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run "$APP" PixelBones-x86_64.AppImage

          # ---------- .deb (instalacion nativa) ----------
          VER="${GITHUB_REF_NAME#v}"; case "$VER" in [0-9]*) ;; *) VER="0.0.0";; esac
          D=debroot
          mkdir -p "$D/DEBIAN" "$D/usr/bin" "$D/usr/share/applications" \
                   "$D/usr/share/icons/hicolor/256x256/apps"
          cp dist/PixelBones "$D/usr/bin/pixelbones"; chmod +x "$D/usr/bin/pixelbones"
          cp docs/icon.png "$D/usr/share/icons/hicolor/256x256/apps/pixelbones.png"
          printf '%s\n' '[Desktop Entry]' 'Type=Application' 'Name=PixelBones' \
            'Comment=Editor de animacion esqueletica para pixel art' \
            'Exec=/usr/bin/pixelbones' 'Icon=pixelbones' 'Categories=Graphics;' \
            'Terminal=false' > "$D/usr/share/applications/pixelbones.desktop"
          { echo "Package: pixelbones"; echo "Version: $VER"; \
            echo "Section: graphics"; echo "Priority: optional"; \
            echo "Architecture: amd64"; \
            echo "Maintainer: StivenColorado <noreply@github.com>"; \
            echo "Description: Editor de animacion esqueletica (cutout) para pixel art"; \
          } > "$D/DEBIAN/control"
          dpkg-deb --build --root-owner-group "$D" PixelBones-amd64.deb

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: PixelBones-*
      - name: Adjuntar a la Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PixelBones-*
